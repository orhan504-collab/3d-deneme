name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Hata 1: Gradyan versiyonunu zorla 8.4'e sabitle (9.x sürümünü engelle)
      # Hata 2: İzinleri baştan ver
      - name: Force Gradle 8.4
        run: |
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      # Hata 3: Projeyi kökten değil, modül bazlı derle
      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
