name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # HATA ÇÖZÜMÜ: Eski tüm gradle dosyalarını silip en baştan kuruyoruz
      - name: Rebuild Gradle Wrapper
        run: |
          rm -rf gradle/wrapper/
          mkdir -p gradle/wrapper
          # Gradle 8.4 sürümünü doğrudan sistem komutuyla zorla yüklüyoruz
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Build with Gradle
        # gradlew dosyasını doğrudan çalıştır
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
