name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          # Yeni sürüm artık api-level/build-tools inputlarını desteklemiyor
          # Bu nedenle workflow’dan kaldırıyoruz ve varsayılan SDK kurulacak
          # Alternatif olarak ortam değişkeniyle compileSdk 34 yükleyebiliriz
          sdk-path: ${{ github.workspace }}/android-sdk

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
