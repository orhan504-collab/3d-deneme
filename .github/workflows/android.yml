name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # HATA ÇÖZÜMÜ: Sistemdeki gradle'ı kullanma, kendi gradlew'ımızı manuel indir ve kur
      - name: Force Clean Wrapper
        run: |
          rm -rf gradle/wrapper/
          mkdir -p gradle/wrapper
          # Gradle 8.4'ü doğrudan JAR ve script olarak indiriyoruz
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew
          chmod +x gradlew

      - name: Build with Gradle 8.4
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
